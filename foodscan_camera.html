<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1A1A1A" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>foodscan – echt eten, echte keuzes</title>
  <style>
:root {
  --color-background-primary: #fff;
  --color-background-secondary: #f5f5f5;
  --color-background-tertiary: #eee;
  --color-text-primary: #1a1a1a;
  --color-text-secondary: #555;
  --color-text-tertiary: #888;
  --color-border-secondary: #ddd;
  --color-border-tertiary: #eee;
  --safe-top: env(safe-area-inset-top, 0);
  --safe-right: env(safe-area-inset-right, 0);
  --safe-bottom: env(safe-area-inset-bottom, 0);
  --safe-left: env(safe-area-inset-left, 0);
  --app-min: 300px;
  --touch-min: 44px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --space-xs: 6px;
  --space-sm: 10px;
  --space-md: 14px;
  --space-lg: 18px;
  --space-xl: 24px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html {
  -webkit-text-size-adjust: 100%;
  -webkit-tap-highlight-color: transparent;
  overflow-x: hidden;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background: var(--color-background-primary);
  min-height: 100vh;
  min-height: 100dvh;
  overflow-x: hidden;
  padding: 0;
  margin: 0;
}

.app {
  width: 100%;
  min-width: var(--app-min);
  min-height: 100vh;
  min-height: 100dvh;
  margin: 0;
  background: var(--color-background-primary);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.header {
  background: #1A1A1A;
  padding: var(--space-md) var(--space-lg) var(--space-sm);
  padding-top: max(var(--space-md), var(--safe-top));
  padding-right: max(var(--space-lg), calc(var(--safe-right) + 44px));
  color: white;
  flex-shrink: 0;
}
.header-inner { padding-right: 48px; }
.logo { font-size: 1.25rem; font-weight: 600; letter-spacing: -0.02em; line-height: 1.2; }
.logo span { color: #A8E063; }
.tagline { font-size: 0.75rem; color: rgba(255,255,255,0.55); margin-top: 2px; line-height: 1.3; }
.tabs { display: flex; border-bottom: 1px solid var(--color-border-tertiary); }
.tab {
  flex: 1;
  padding: var(--space-sm) var(--space-xs);
  min-height: var(--touch-min);
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  font-size: 0.8125rem;
  font-weight: 500;
  color: var(--color-text-secondary);
  cursor: pointer;
  border-bottom: 3px solid transparent;
  -webkit-user-select: none;
  user-select: none;
  transition: color 0.15s ease, border-color 0.15s ease;
}
.tab.active { color: var(--color-text-primary); border-bottom-color: #A8E063; }
.content {
  padding: var(--space-lg);
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  max-width: 640px;
  margin-left: auto;
  margin-right: auto;
  width: 100%;
  box-sizing: border-box;
}

.camera-container { position: relative; width: 100%; border-radius: var(--radius-md); overflow: hidden; background: #000; margin-bottom: var(--space-md); aspect-ratio: 4/3; max-height: 50vh; }
.camera-video { width: 100%; height: 100%; object-fit: cover; display: block; border-radius: inherit; }
.camera-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
.scan-frame { width: 70%; aspect-ratio: 3/1; border: 2px solid #A8E063; border-radius: var(--radius-sm); box-shadow: 0 0 0 9999px rgba(0,0,0,0.45); }
.scan-line { position: absolute; width: 66%; height: 2px; background: linear-gradient(90deg, transparent, #A8E063, transparent); animation: scanline 2s ease-in-out infinite; }
@keyframes scanline { 0%,100% { top: 28%; } 50% { top: 68%; } }
.photo-frame { width: 80%; aspect-ratio: 4/3; border: 2px solid #A8E063; border-radius: var(--radius-sm); box-shadow: 0 0 0 9999px rgba(0,0,0,0.45); }

.cam-btn-row { display: flex; gap: var(--space-sm); margin-bottom: var(--space-md); flex-wrap: wrap; }
.cam-btn {
  flex: 1;
  min-width: 0;
  min-height: var(--touch-min);
  padding: var(--space-sm) var(--space-md);
  border: 1px solid var(--color-border-secondary);
  border-radius: var(--radius-md);
  font-size: 0.875rem;
  font-weight: 500;
  cursor: pointer;
  background: var(--color-background-secondary);
  color: var(--color-text-primary);
  -webkit-tap-highlight-color: transparent;
  transition: background 0.15s ease, border-color 0.15s ease;
}
.cam-btn.primary { background: #1A1A1A; color: white; border-color: #1A1A1A; }
.cam-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.cam-btn:hover:not(:disabled) { background: var(--color-background-tertiary); }
.cam-btn.primary:hover:not(:disabled) { background: #333; }
@media (hover: none) { .cam-btn:active:not(:disabled) { opacity: 0.9; } }

.status-bar { font-size: 0.8125rem; color: var(--color-text-secondary); text-align: center; padding: var(--space-xs) 0; min-height: 2rem; }
.status-bar.detecting { color: #3B6D11; }
.status-bar.error { color: #A32D2D; }

.or { text-align: center; font-size: 0.75rem; color: var(--color-text-tertiary); margin: var(--space-sm) 0; }
.input-row { display: flex; gap: var(--space-sm); margin-bottom: var(--space-md); flex-wrap: wrap; align-items: stretch; }
.barcode-input {
  flex: 1 1 120px;
  min-width: 0;
  padding: var(--space-sm) var(--space-md);
  font-size: 16px;
  border: 1px solid var(--color-border-secondary);
  border-radius: var(--radius-md);
  background: var(--color-background-primary);
  color: var(--color-text-primary);
}
.input-row .cam-btn { flex: 0 0 auto; min-width: 72px; white-space: nowrap; }
.result-card { border: 1px solid var(--color-border-tertiary); border-radius: var(--radius-md); overflow: hidden; margin-bottom: var(--space-md); }
.result-header { padding: var(--space-md) var(--space-lg); display: flex; align-items: center; gap: var(--space-md); flex-wrap: wrap; }
.nova-badge { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.125rem; font-weight: 600; flex-shrink: 0; }
.nova-1 { background: #EAF3DE; color: #3B6D11; }
.nova-2 { background: #FAEEDA; color: #854F0B; }
.nova-3 { background: #FAEEDA; color: #BA7517; }
.nova-4 { background: #FCEBEB; color: #A32D2D; }
.result-name { font-size: 1rem; font-weight: 600; color: var(--color-text-primary); word-break: break-word; line-height: 1.3; }
.result-brand { font-size: 0.8125rem; color: var(--color-text-secondary); margin-top: 2px; }
.result-body { padding: 0 var(--space-lg) var(--space-lg); }
.nova-label { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 0.75rem; font-weight: 600; margin-bottom: var(--space-sm); }
.nova-label-1 { background: #EAF3DE; color: #3B6D11; }
.nova-label-2 { background: #FAEEDA; color: #854F0B; }
.nova-label-3 { background: #FAEEDA; color: #BA7517; }
.nova-label-4 { background: #FCEBEB; color: #A32D2D; }
.verdict { font-size: 0.875rem; color: var(--color-text-secondary); line-height: 1.55; margin-bottom: var(--space-md); word-break: break-word; }
.alt-section { background: var(--color-background-secondary); border-radius: var(--radius-md); padding: var(--space-md); }
.alt-label { font-size: 0.6875rem; font-weight: 600; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: var(--space-xs); }
.alt-item { display: flex; align-items: center; justify-content: space-between; padding: var(--space-sm) 0; border-bottom: 1px solid var(--color-border-tertiary); gap: var(--space-sm); flex-wrap: wrap; }
.alt-item:last-child { border-bottom: none; padding-bottom: 0; }
.alt-name { font-size: 0.8125rem; font-weight: 600; color: var(--color-text-primary); word-break: break-word; }
.alt-where { font-size: 0.6875rem; color: var(--color-text-secondary); margin-top: 2px; }
.alt-nova { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 10px; background: #EAF3DE; color: #3B6D11; flex-shrink: 0; }
.loading { text-align: center; padding: var(--space-xl) var(--space-lg); }
.spinner { width: 32px; height: 32px; border: 2px solid var(--color-border-tertiary); border-top-color: #A8E063; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto var(--space-sm); }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 0.875rem; color: var(--color-text-secondary); }
.empty-state { text-align: center; padding: var(--space-xl) var(--space-lg); color: var(--color-text-tertiary); font-size: 0.875rem; line-height: 1.5; }
.captured-preview { width: 100%; height: auto; border-radius: var(--radius-md); margin-bottom: var(--space-sm); display: block; }
canvas#capture-canvas { display: none; }

.settings-btn {
  position: absolute;
  top: max(var(--space-md), var(--safe-top));
  right: max(var(--space-md), var(--safe-right));
  width: var(--touch-min);
  height: var(--touch-min);
  border: none;
  border-radius: 50%;
  background: rgba(255,255,255,0.12);
  color: white;
  font-size: 1.25rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.15s ease;
}
.settings-btn:hover { background: rgba(255,255,255,0.22); }
.header { position: relative; }
.settings-overlay { position: fixed; inset: 0; top: var(--safe-top); right: var(--safe-right); bottom: var(--safe-bottom); left: var(--safe-left); background: rgba(0,0,0,0.5); z-index: 100; display: none; align-items: center; justify-content: center; padding: clamp(12px, 4vw, 24px); overflow-y: auto; -webkit-overflow-scrolling: touch; }
.settings-overlay.open { display: flex; }
.settings-panel { background: var(--color-background-primary); border-radius: var(--radius-lg); padding: var(--space-xl); max-width: min(360px, calc(100vw - 32px)); width: 100%; border: 1px solid var(--color-border-tertiary); margin: auto; box-shadow: 0 8px 32px rgba(0,0,0,0.15); }
.settings-panel h3 { font-size: 1.125rem; font-weight: 600; margin-bottom: var(--space-lg); color: var(--color-text-primary); }
.settings-row { margin-bottom: var(--space-md); }
.settings-row label { display: block; font-size: 0.8125rem; font-weight: 500; color: var(--color-text-secondary); margin-bottom: 4px; }
.settings-row select, .settings-row input { width: 100%; padding: var(--space-sm) var(--space-md); font-size: 16px; border: 1px solid var(--color-border-secondary); border-radius: var(--radius-md); background: var(--color-background-primary); color: var(--color-text-primary); min-height: var(--touch-min); }
.settings-row input::placeholder { color: var(--color-text-tertiary); }
.settings-hint { font-size: 0.75rem; color: var(--color-text-tertiary); margin-top: var(--space-xs); }
.settings-actions { display: flex; gap: var(--space-sm); margin-top: var(--space-xl); flex-wrap: wrap; }
.settings-actions .cam-btn { flex: 1; min-width: 100px; }
.api-missing { background: #FAEEDA; color: #854F0B; padding: var(--space-sm) var(--space-md); border-radius: var(--radius-md); font-size: 0.8125rem; margin-bottom: var(--space-md); line-height: 1.4; }
.api-missing a { color: #854F0B; font-weight: 600; cursor: pointer; text-decoration: underline; }
@media (max-width: 359px) {
  .content { padding: var(--space-md); }
  .cam-btn-row, .input-row { gap: var(--space-xs); }
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-inner">
      <div class="logo">food<span>scan</span></div>
      <div class="tagline">echt eten, echte keuzes</div>
    </div>
    <button class="settings-btn" onclick="openSettings()" title="Instellingen" aria-label="Instellingen">⚙</button>
  </div>
  <div class="settings-overlay" id="settings-overlay">
    <div class="settings-panel">
      <h3>Instellingen</h3>
      <div class="settings-row">
        <label>AI-provider</label>
        <select id="settings-provider">
          <option value="openai">OpenAI (goedkoper)</option>
          <option value="anthropic">Anthropic (Claude)</option>
        </select>
        <div class="settings-hint">OpenAI is goedkoper; Claude is vaak iets sterker op teksten.</div>
      </div>
      <div class="settings-row">
        <label>API-key</label>
        <input type="password" id="settings-apikey" placeholder="sk-... of sk-ant-..." autocomplete="off" />
        <div class="settings-hint">Wordt lokaal opgeslagen. Nooit gedeeld.</div>
      </div>
      <div class="settings-actions">
        <button class="cam-btn" onclick="closeSettings()">Sluiten</button>
        <button class="cam-btn primary" onclick="saveSettings()">Opslaan</button>
      </div>
    </div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('barcode')">Barcode</div>
    <div class="tab" onclick="switchTab('foto')">Ingrediënten</div>
    <div class="tab" onclick="switchTab('history')">Recent</div>
  </div>
  <div class="content">

    <div id="tab-barcode">
      <div class="camera-container" id="bc-cam-box" style="display:none">
        <video id="bc-video" class="camera-video" autoplay playsinline muted></video>
        <div class="camera-overlay"><div class="scan-frame"></div><div class="scan-line"></div></div>
      </div>
      <div class="cam-btn-row">
        <button class="cam-btn primary" id="bc-cam-btn" onclick="toggleBarcodeCamera()">Camera openen</button>
        <button class="cam-btn" id="bc-stop-btn" onclick="stopBarcodeCamera()" style="display:none">Stop camera</button>
      </div>
      <div class="status-bar" id="bc-status">Of typ barcode hieronder</div>
      <div class="or">— of —</div>
      <div class="input-row" role="search">
        <input class="barcode-input" id="barcode-field" placeholder="bv. 8718309228874" type="number" />
        <button type="button" class="cam-btn primary btn-zoek" onclick="analyzeBarcode()">Zoek</button>
      </div>
      <div id="barcode-result"></div>
    </div>

    <div id="tab-foto" style="display:none">
      <div class="camera-container" id="photo-cam-box" style="display:none">
        <video id="photo-video" class="camera-video" autoplay playsinline muted></video>
        <div class="camera-overlay"><div class="photo-frame"></div></div>
      </div>
      <img id="captured-img" class="captured-preview" style="display:none" />
      <canvas id="capture-canvas"></canvas>
      <div class="cam-btn-row" id="photo-btn-row">
        <button class="cam-btn primary" id="photo-cam-btn" onclick="openPhotoCamera()">Camera openen</button>
        <button class="cam-btn" onclick="document.getElementById('file-input').click()">Uit galerij</button>
      </div>
      <div class="cam-btn-row" id="photo-shoot-row" style="display:none">
        <button class="cam-btn primary" onclick="capturePhoto()">Maak foto</button>
        <button class="cam-btn" onclick="stopPhotoCamera()">Annuleer</button>
      </div>
      <div class="cam-btn-row" id="photo-analyze-row" style="display:none">
        <button class="cam-btn primary" onclick="analyzePhoto()">Analyseer</button>
        <button class="cam-btn" onclick="retakePhoto()">Opnieuw</button>
      </div>
      <input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleFileUpload(this)" />
      <div id="photo-result"></div>
    </div>

    <div id="tab-history" style="display:none">
      <div id="history-list"><div class="empty-state">Nog geen producten gescand</div></div>
    </div>

  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<script>
const STORAGE_KEY = 'foodscan_apikey';
const STORAGE_PROVIDER = 'foodscan_provider';

let currentTab = 'barcode';
let history = [];
let bcStream = null;
let photoStream = null;
let photoBase64 = null;
let barcodeDetected = false;
let quaggaRunning = false;
let lastScannedCode = null;
let scanConfirmCount = 0;

function getApiConfig() {
  const apiKey = (typeof localStorage !== 'undefined' && localStorage.getItem(STORAGE_KEY)) || '';
  const provider = (typeof localStorage !== 'undefined' && localStorage.getItem(STORAGE_PROVIDER)) || 'openai';
  if (!apiKey || !apiKey.trim()) return null;
  return { provider: provider.trim() || 'openai', apiKey: apiKey.trim() };
}

function openSettings() {
  const cfg = getApiConfig();
  document.getElementById('settings-provider').value = (cfg && cfg.provider) || 'openai';
  document.getElementById('settings-apikey').value = (cfg && cfg.apiKey) || '';
  document.getElementById('settings-overlay').classList.add('open');
}
function closeSettings() {
  document.getElementById('settings-overlay').classList.remove('open');
}
function saveSettings() {
  const provider = document.getElementById('settings-provider').value;
  const apiKey = document.getElementById('settings-apikey').value.trim();
  if (typeof localStorage !== 'undefined') {
    localStorage.setItem(STORAGE_PROVIDER, provider);
    localStorage.setItem(STORAGE_KEY, apiKey);
  }
  closeSettings();
}

async function callAI(prompt, imageBase64) {
  const cfg = getApiConfig();
  if (!cfg) return null;

  if (cfg.provider === 'openai') {
    const url = 'https://api.openai.com/v1/chat/completions';
    const body = {
      model: 'gpt-4o-mini',
      max_tokens: 1000,
      messages: [{ role: 'user', content: imageBase64
        ? [{ type: 'text', text: prompt }, { type: 'image_url', image_url: { url: 'data:image/jpeg;base64,' + imageBase64 } }]
        : prompt
      }]
    };
    const r = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + cfg.apiKey },
      body: JSON.stringify(body)
    });
    const data = await r.json();
    if (data.error) throw new Error(data.error.message || 'OpenAI fout');
    return (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content) || '';
  }

  if (cfg.provider === 'anthropic') {
    const url = 'https://api.anthropic.com/v1/messages';
    const body = imageBase64
      ? { model: 'claude-sonnet-4-20250514', max_tokens: 1000, messages: [{ role: 'user', content: [
          { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: imageBase64 } },
          { type: 'text', text: prompt }
        ]}]}
      : { model: 'claude-sonnet-4-20250514', max_tokens: 1000, messages: [{ role: 'user', content: prompt }] };
    const r = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': cfg.apiKey, 'anthropic-version': '2023-06-01' },
      body: JSON.stringify(body)
    });
    const data = await r.json();
    if (data.error) throw new Error(data.error.message || 'Anthropic fout');
    return (data.content && data.content.map(i => i.text || '').join('')) || '';
  }
  return null;
}

function parseAIJson(text) {
  if (!text || typeof text !== 'string') throw new Error('Geen antwoord van de AI ontvangen.');
  var raw = text.trim()
    .replace(/^```(?:json)?\s*/i, '')
    .replace(/\s*```\s*$/i, '')
    .trim();
  var start = raw.indexOf('{');
  if (start === -1) {
    throw new Error('De AI gaf geen JSON terug (alleen tekst). Probeer opnieuw of een andere barcode.');
  }
  var depth = 0;
  var end = -1;
  for (var i = start; i < raw.length; i++) {
    if (raw[i] === '{') depth++;
    else if (raw[i] === '}') { depth--; if (depth === 0) { end = i; break; } }
  }
  if (end === -1) raw = raw.slice(start); else raw = raw.slice(start, end + 1);
  try {
    return JSON.parse(raw);
  } catch (e) {
    var msg = (e && e.message) ? e.message : 'ongeldige JSON';
    throw new Error('Antwoord kon niet worden gelezen. Probeer opnieuw. [' + String(msg).slice(0, 50) + ']');
  }
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['barcode','foto','history'][i] === tab));
  ['barcode','foto','history'].forEach(id => document.getElementById('tab-'+id).style.display = id === tab ? 'block' : 'none');
  if (tab !== 'barcode') stopBarcodeCamera();
  if (tab !== 'foto') stopPhotoCamera();
  if (tab === 'history') renderHistory();
}

function toggleBarcodeCamera() {
  if (bcStream) { stopBarcodeCamera(); return; }
  openBarcodeCamera();
}

async function openBarcodeCamera() {
  barcodeDetected = false;
  lastScannedCode = null;
  scanConfirmCount = 0;
  const box = document.getElementById('bc-cam-box');
  const video = document.getElementById('bc-video');
  const status = document.getElementById('bc-status');
  try {
    bcStream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: 'environment',
        width: { ideal: 1280, min: 640 },
        height: { ideal: 720, min: 480 }
      }
    });
    video.srcObject = bcStream;
    box.style.display = 'block';
    document.getElementById('bc-cam-btn').textContent = 'Camera actief';
    document.getElementById('bc-stop-btn').style.display = 'block';
    status.textContent = 'Richt op een barcode...';
    status.className = 'status-bar detecting';
    video.onloadedmetadata = () => startQuagga(video);
  } catch(e) {
    status.textContent = 'Camera niet beschikbaar. Typ barcode hieronder.';
    status.className = 'status-bar error';
  }
}

function startQuagga(video) {
  if (quaggaRunning) return;
  quaggaRunning = true;
  Quagga.init({
    inputStream: {
      type: 'LiveStream',
      target: video,
      constraints: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
      area: { top: '15%', right: '15%', left: '15%', bottom: '25%' }
    },
    locator: { patchSize: 'medium', halfSample: false },
    numOfWorkers: 4,
    decoder: {
      readers: ['ean_reader', 'ean_8_reader', 'code_128_reader', 'upc_reader'],
      multiple: false
    },
    locate: true
  }, function(err) {
    if (err) {
      Quagga.init({
        inputStream: { type: 'LiveStream', target: video, constraints: { facingMode: 'environment' } },
        decoder: { readers: ['ean_reader', 'ean_8_reader', 'code_128_reader', 'upc_reader'] },
        locate: true
      }, function(e) { if (!e) Quagga.start(); });
      return;
    }
    Quagga.start();
  });
  Quagga.onDetected(function(data) {
    if (barcodeDetected) return;
    var code = data.codeResult ? data.codeResult.code : null;
    if (!code || code.length < 8) return;
    if (code === lastScannedCode) {
      scanConfirmCount++;
      if (scanConfirmCount >= 2) {
        barcodeDetected = true;
        document.getElementById('bc-status').textContent = 'Barcode gevonden: ' + code;
        document.getElementById('bc-status').className = 'status-bar detecting';
        document.getElementById('barcode-field').value = code;
        stopBarcodeCamera();
        analyzeBarcode();
      }
    } else {
      lastScannedCode = code;
      scanConfirmCount = 1;
    }
  });
}

function stopBarcodeCamera() {
  if (quaggaRunning) { try { Quagga.stop(); } catch(e) {} quaggaRunning = false; }
  if (bcStream) { bcStream.getTracks().forEach(t => t.stop()); bcStream = null; }
  document.getElementById('bc-cam-box').style.display = 'none';
  document.getElementById('bc-cam-btn').textContent = 'Camera openen';
  document.getElementById('bc-stop-btn').style.display = 'none';
  if (!barcodeDetected) {
    document.getElementById('bc-status').textContent = 'Of typ barcode hieronder';
    document.getElementById('bc-status').className = 'status-bar';
  }
}

async function openPhotoCamera() {
  const box = document.getElementById('photo-cam-box');
  const video = document.getElementById('photo-video');
  try {
    photoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    video.srcObject = photoStream;
    box.style.display = 'block';
    document.getElementById('photo-btn-row').style.display = 'none';
    document.getElementById('photo-shoot-row').style.display = 'flex';
    document.getElementById('photo-analyze-row').style.display = 'none';
    document.getElementById('captured-img').style.display = 'none';
  } catch(e) {
    document.getElementById('photo-result').innerHTML = '<div class="empty-state">Camera niet beschikbaar. Gebruik "Uit galerij".</div>';
  }
}

function capturePhoto() {
  const video = document.getElementById('photo-video');
  const canvas = document.getElementById('capture-canvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
  photoBase64 = dataUrl.split(',')[1];
  const img = document.getElementById('captured-img');
  img.src = dataUrl;
  img.style.display = 'block';
  stopPhotoCamera(true);
  document.getElementById('photo-btn-row').style.display = 'none';
  document.getElementById('photo-shoot-row').style.display = 'none';
  document.getElementById('photo-analyze-row').style.display = 'flex';
}

function stopPhotoCamera(keepPreview) {
  if (photoStream) { photoStream.getTracks().forEach(t => t.stop()); photoStream = null; }
  document.getElementById('photo-cam-box').style.display = 'none';
  if (!keepPreview) {
    document.getElementById('photo-btn-row').style.display = 'flex';
    document.getElementById('photo-shoot-row').style.display = 'none';
    document.getElementById('photo-analyze-row').style.display = 'none';
  }
}

function retakePhoto() {
  photoBase64 = null;
  document.getElementById('captured-img').style.display = 'none';
  document.getElementById('photo-result').innerHTML = '';
  document.getElementById('photo-btn-row').style.display = 'flex';
  document.getElementById('photo-shoot-row').style.display = 'none';
  document.getElementById('photo-analyze-row').style.display = 'none';
}

function handleFileUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    photoBase64 = e.target.result.split(',')[1];
    const img = document.getElementById('captured-img');
    img.src = e.target.result;
    img.style.display = 'block';
    document.getElementById('photo-btn-row').style.display = 'none';
    document.getElementById('photo-analyze-row').style.display = 'flex';
  };
  reader.readAsDataURL(file);
}

async function analyzeBarcode() {
  const barcode = document.getElementById('barcode-field').value.trim();
  if (!barcode) return;
  const el = document.getElementById('barcode-result');
  el.innerHTML = `<div class="loading"><div class="spinner"></div><div class="loading-text">Product opzoeken...</div></div>`;
  let productData = null;
  try {
    const r = await fetch(`https://world.openfoodfacts.org/api/v0/product/${barcode}.json`);
    const d = await r.json();
    if (d.status === 1) productData = d.product;
  } catch(e) {}
  const name = productData ? (productData.product_name_nl || productData.product_name || 'Onbekend') : 'Onbekend';
  const brand = productData ? (productData.brands || '') : '';
  const ingredients = productData ? (productData.ingredients_text_nl || productData.ingredients_text || '') : '';
  const nova = productData ? (productData.nova_group || '') : '';
  const prompt = productData
    ? `Analyseer dit voedingsproduct voor een Nederlandse consument. Antwoord uitsluitend met één JSON-object, geen tekst ervoor of erna, geen markdown.\n\nProduct: ${name}\nMerk: ${brand}\nIngrediënten: ${ingredients}\nNOVA: ${nova}\n\nVerplicht formaat, alleen dit JSON-object:\n{"naam":"...","merk":"...","nova":1-4,"nova_label":"Onbewerkt/Licht bewerkt/Bewerkt/Ultrabewerkt","oordeel":"2-3 zinnen eerlijk oordeel","alternatieven":[{"naam":"...","waar":"AH/Jumbo/online","nova":1}]}`
    : `Barcode ${barcode} is niet gevonden. Antwoord uitsluitend met dit exacte JSON-object, geen andere tekst:\n{"naam":"Onbekend product","merk":"","nova":null,"nova_label":"Niet gevonden","oordeel":"Product niet gevonden in database. Probeer de ingrediënten-tab.","alternatieven":[]}`;
  const cfg = getApiConfig();
  if (!cfg) {
    el.innerHTML = `<div class="api-missing">Voeg eerst je API-key toe in <a onclick="openSettings()">Instellingen (⚙)</a> om producten te analyseren.</div>`;
    return;
  }
  el.innerHTML = `<div class="loading"><div class="spinner"></div><div class="loading-text">Analyseren...</div></div>`;
  try {
    const text = await callAI(prompt);
    const result = parseAIJson(text);
    history.unshift({ type: 'barcode', barcode, result, time: new Date() });
    el.innerHTML = renderResult(result);
  } catch(e) {
    el.innerHTML = `<div class="empty-state">Fout bij analyseren: ${e.message || 'Probeer opnieuw.'}</div>`;
  }
}

async function analyzePhoto() {
  if (!photoBase64) return;
  const el = document.getElementById('photo-result');
  const cfg = getApiConfig();
  if (!cfg) {
    el.innerHTML = `<div class="api-missing">Voeg eerst je API-key toe in <a onclick="openSettings()">Instellingen (⚙)</a> om foto's te analyseren.</div>`;
    return;
  }
  const photoPrompt = `Lees de ingrediëntenlijst en analyseer het product (NOVA 1=onbewerkt, 4=ultrabewerkt). Antwoord uitsluitend met één JSON-object, geen tekst ervoor of erna:\n{"naam":"...","merk":"...","nova":1-4,"nova_label":"...","oordeel":"2-3 zinnen","alternatieven":[{"naam":"...","waar":"AH/Jumbo/online","nova":1}]}`;
  el.innerHTML = `<div class="loading"><div class="spinner"></div><div class="loading-text">Ingrediënten lezen...</div></div>`;
  try {
    const text = await callAI(photoPrompt, photoBase64);
    const result = parseAIJson(text);
    history.unshift({ type: 'foto', result, time: new Date() });
    el.innerHTML = renderResult(result);
  } catch(e) {
    el.innerHTML = `<div class="empty-state">Kon afbeelding niet analyseren: ${e.message || 'Zorg dat de ingrediëntenlijst goed zichtbaar is.'}</div>`;
  }
}

function renderResult(r) {
  const nova = r.nova || 4;
  const alts = (r.alternatieven || []).map(a => `<div class="alt-item"><div><div class="alt-name">${a.naam}</div><div class="alt-where">${a.waar}</div></div><div class="alt-nova">NOVA ${a.nova}</div></div>`).join('');
  return `<div class="result-card"><div class="result-header"><div class="nova-badge nova-${nova}">${nova || '?'}</div><div><div class="result-name">${r.naam || 'Onbekend'}</div><div class="result-brand">${r.merk || ''}</div></div></div><div class="result-body"><span class="nova-label nova-label-${nova}">${r.nova_label || ''}</span><div class="verdict">${r.oordeel || ''}</div>${alts ? `<div class="alt-section"><div class="alt-label">Gezonde alternatieven</div>${alts}</div>` : ''}</div></div>`;
}

function renderHistory() {
  const el = document.getElementById('history-list');
  if (!history.length) { el.innerHTML = '<div class="empty-state">Nog geen producten gescand</div>'; return; }
  el.innerHTML = history.map(h => `<div style="margin-bottom:12px;padding-bottom:12px;border-bottom:0.5px solid var(--color-border-tertiary)"><div style="font-size:clamp(10px,2.5vw,12px);color:var(--color-text-tertiary);margin-bottom:6px">${h.time.toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'})}</div>${renderResult(h.result)}</div>`).join('');
}
</script>
